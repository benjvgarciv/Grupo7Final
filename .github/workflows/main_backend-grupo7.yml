# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - backend-grupo7

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      # Entramos a la carpeta backend, instalamos y creamos un ZIP plano con el contenido interno
      - name: Prepare production build and zip
        run: |
          cd backend
          npm install --omit=dev
          npm run build --if-present
          zip -r ../release.zip .

      # Subimos únicamente nuestro archivo ZIP comprimido
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      # Descargamos el archivo ZIP en la raíz del entorno de ejecución
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .
        
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0556E507F426452DAB6816EB17265084 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_04F6221B01E2471FAEF96CC0B76F77D3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F7C00F218FF8467F8C81771DCBCC5998 }}

      # Le pasamos el archivo ZIP directo a Azure para que lo extraiga en la raíz real sin subcarpetas
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'backend-grupo7'
          slot-name: 'Production'
          package: ./release.zip
